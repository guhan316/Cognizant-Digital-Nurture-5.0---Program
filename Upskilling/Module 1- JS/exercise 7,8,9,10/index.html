<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster 4: Interactive Event Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

    <div class="container" style="max-width: 800px;">
        <h3 class="mb-3">Campus Portal Dash - Cluster 4</h3>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <select id="categoryFilter" class="form-select">
                    <option value="All">All Categories</option>
                    <option value="Technical">Technical</option>
                    <option value="Placement">Placement</option>
                </select>
            </div>
            <div class="col-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Type event name to search...">
            </div>
        </div>

        <div id="loadingSpinner" class="text-center my-3 d-none">
            <div class="spinner-border text-dark" role="status"></div>
            <p class="small text-muted">Fetching live student schedules...</p>
        </div>

        <div id="eventContainer" class="row g-3"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
