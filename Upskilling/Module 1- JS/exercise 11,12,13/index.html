<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster 5: Registration Form & Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow-sm border bg-white">
            <h5 class="mb-3 text-dark">Ex 11, 12, 13: Portal Form Submission</h5>
            
            <form id="registrationForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" name="studentName" class="form-control" placeholder="Enter name">
                    <div id="nameError" class="text-danger small mt-1 d-none">Name field cannot be empty!</div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">College Email ID</label>
                    <input type="email" name="studentEmail" class="form-control" placeholder="username@smvec.ac.in">
                    <div id="emailError" class="text-danger small mt-1 d-none">Enter a valid email address!</div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Select Campus Event</label>
                    <select name="selectedEvent" class="form-select">
                        <option value="">-- Choose Track --</option>
                        <option value="Placement Drive">Mock Technical Placement Drive</option>
                        <option value="SaaS Workshop">Sass Customization Masterclass</option>
                    </select>
                    <div id="eventError" class="text-danger small mt-1 d-none">Please pick an option track!</div>
                </div>

                <button type="submit" class="btn btn-dark w-100 btn-sm mt-2">Submit Application</button>
            </form>

            <div id="statusAlert" class="alert alert-info mt-3 d-none small text-center"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
