<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercises 17 & 18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light p-4 pb-5">
    <center>
    <div class="mb-5">
        <h6>Module 17: Bootstrap Icons</h6>
        <div class="my-2">
            <span class="me-2 text-muted"><small>Ex 17.2 (Buttons):</small></span>
            <button class="btn btn-outline-dark" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-outline-success" title="Download"><i class="bi bi-download"></i></button>
            <button class="btn btn-outline-danger" title="Delete"><i class="bi bi-trash"></i></button>
        </div>
    </div>

    <div class="mb-5">
        <h6>Module 18: JS Plugins</h6>
        <div class="my-3">
            <span class="me-2 text-muted"><small>Ex 18.1:</small></span>
            <button class="btn btn-dark btn-sm" data-bs-toggle="modal" data-bs-target="#ex181Modal">Open Assessment Rules</button>
        </div>

        <div class="accordion mt-3" id="exAccordion" style="max-width: 500px;">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed py-2" data-bs-toggle="collapse" data-bs-target="#ac1">
                        Ex 18.2: View FAQ Accordion Question
                    </button>
                </h2>
                <div id="ac1" class="accordion-collapse collapse" data-bs-parent="#exAccordion">
                    <div class="accordion-body text-secondary small">Push all your task folders to GitLab repository.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="ex181Modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header py-2"><h6 class="modal-title">Ex 18.1: Lab Rules</h6></div>
                <div class="modal-body small">Complete all 19 modules for Digital Nurture tracking.</div>
            </div>
        </div>
    </div>

    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center py-2 d-flex justify-content-center gap-3 align-items-center">
        <span class="small text-warning">Ex 17.1 Footer:</span>
        <a href="#" class="text-white"><i class="bi bi-linkedin"></i></a>
        <a href="#" class="text-white"><i class="bi bi-github"></i></a>
    </footer>
</center>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
